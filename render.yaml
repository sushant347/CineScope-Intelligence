services:
  - type: web
    name: cinescope-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate
    startCommand: gunicorn config.wsgi:application --workers=1 --timeout=90 --graceful-timeout=30 --keep-alive=5 --log-file -
    healthCheckPath: /api/health/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.9"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost,127.0.0.1
      - key: CORS_ALLOWED_ORIGIN_REGEXES
        value: https://.*\.vercel\.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.vercel.app
      - key: HF_BERT_MODEL_ID
        value: distilbert-base-uncased-finetuned-sst-2-english
      - key: HF_API_TOKEN
        sync: false
      - key: HF_BERT_TIMEOUT_SECONDS
        value: "8"
      - key: HF_BERT_RETRIES
        value: "1"
      - key: HF_BERT_WAIT_FOR_MODEL
        value: "False"
      - key: ENABLE_SVM_RUNTIME_BOOTSTRAP
        value: "True"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "True"
      - key: DJANGO_SECURE_HSTS_SECONDS
        value: "31536000"
